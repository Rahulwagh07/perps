services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: backend
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    expose:
      - '3000'
    mem_limit: 512m

  ws:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: ws
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8081
    restart: unless-stopped
    expose:
      - '8081'
    mem_limit: 512m

  engine:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: engine
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    mem_limit: 512m

  poller:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: poller
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    mem_limit: 512m

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - ws
    restart: unless-stopped
