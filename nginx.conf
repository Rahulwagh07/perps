worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # --------------------------------------------------------
    # Rate Limiting Configuration
    # --------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/s;

    upstream backend_servers {
        server backend:3000;
    }

    upstream ws_servers {
        server ws:8081;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name api-perps.rsw.wtf;
        return 301 https://$host$request_uri;
    }

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name api-perps.rsw.wtf;

        # SSL Certificates
        ssl_certificate /etc/letsencrypt/live/api-perps.rsw.wtf/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api-perps.rsw.wtf/privkey.pem;

        # --------------------------------------------------------
        # Backend API Proxy with Rate Limiting
        # --------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://backend_servers/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --------------------------------------------------------
        # WebSocket Proxy
        # --------------------------------------------------------
        location /ws/ {
            limit_req zone=ws_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://ws_servers/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
