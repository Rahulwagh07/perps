worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # --------------------------------------------------------
    # Rate Limiting Configuration
    # --------------------------------------------------------
    # This zone keeps track of the request rate per IP.
    # We allow a maximum of 10 requests per second per IP.
    # 10m means it allocates 10 Megabytes of memory to store IP states (can hold ~160,000 IPs).
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Websockets connection initiation rate limit (optional, to prevent connection flooding)
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/s;

    upstream backend_servers {
        server backend:3000;
    }

    upstream ws_servers {
        server ws:8081;
    }

    server {
        listen 80;
        
        # --------------------------------------------------------
        # Backend API Proxy with Rate Limiting
        # --------------------------------------------------------
        location /api/ {
            # Apply rate limit. 'burst=20' means if 20 requests come at once, 
            # they will be queued and processed at 10 r/s instead of immediately rejected.
            # 'nodelay' means they are processed immediately if within burst limit.
            limit_req zone=api_limit burst=20 nodelay;
            
            # Return 429 Too Many Requests if the limit is exceeded
            limit_req_status 429;

            proxy_pass http://backend_servers/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --------------------------------------------------------
        # WebSocket Proxy
        # --------------------------------------------------------
        location /ws/ {
            limit_req zone=ws_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://ws_servers/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
